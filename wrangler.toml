#:schema node_modules/@opennextjs/cloudflare/schema.json
name = "agentic-fox-labs-erp"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# OpenNext for Cloudflare uses Workers, not Pages
main = ".open-next/worker.js"
assets = { directory = ".open-next/assets", binding = "ASSETS" }

[[d1_databases]]
binding = "DB"
database_name = "agentic-fox-erp-db"
database_id = "1caceb0e-63ed-48fc-a4b6-0aa4a8199dfe"
